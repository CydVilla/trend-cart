name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @trendcart/db exec prisma generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        # The lint script lives at the repo ROOT (eslint.config.mjs covers the
        # whole monorepo) — `-r` would look only in workspace packages.
        run: pnpm lint

      - name: Build web
        # Dummy DB URL: next build only needs the env var to exist, pages are
        # dynamic and never touch the DB at build time.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm --filter @trendcart/web build
