name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Secret scan
        # Backstop for the local pre-push discipline: fail the build if a
        # committed file ever contains a live-looking credential — Anthropic
        # keys, Resend keys, or a Postgres URL with a real (non-localhost)
        # password. .env is gitignored; this catches the accident anyway.
        run: |
          matches=$(grep -rInE "sk-ant-api[0-9a-zA-Z_-]{10,}|re_[0-9A-Za-z]{20,}|postgres(ql)?://[^/[:space:]:]+:[^@[:space:]]+@" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude=pnpm-lock.yaml . \
            | grep -vE "localhost|127\.0\.0\.1|@db\b" || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Possible committed secret found (see matches above)"; exit 1
          fi
          echo "no secrets detected"

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @trendcart/db exec prisma generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        # The lint script lives at the repo ROOT (eslint.config.mjs covers the
        # whole monorepo) — `-r` would look only in workspace packages.
        run: pnpm lint

      - name: Build web
        # Dummy DB URL: next build only needs the env var to exist, pages are
        # dynamic and never touch the DB at build time.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm --filter @trendcart/web build
