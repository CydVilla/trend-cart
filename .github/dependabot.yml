# Monthly, batched dependency PRs — enough to catch security patches without
# a weekly PR flood on a solo project. CI (typecheck/lint/build + secret scan)
# is the merge gate.
#
# Majors are excluded: the first grouped run bundled Prisma 6→7, whose
# breaking schema-config change failed CI and would have poisoned the whole
# batch. Minor/patch keeps the security-fix value; majors are deliberate,
# hand-done upgrades.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      all-npm-deps:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
